<!DOCTYPE html>
<html lang="en">

<!-- ⭐ AUTO‑APPLY THEME from index page BEFORE anything renders -->
<script>
  (function () {
    try {
      const THEME_KEY = 'app-theme';
      const LIGHT = 'theme-light';
      const DARK  = 'theme-dark';
      const saved = localStorage.getItem(THEME_KEY);
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const cls = (saved === LIGHT || saved === DARK) ? saved : (prefersDark ? DARK : LIGHT);
      document.documentElement.classList.add(cls);
    } catch (e) {}
  })();
</script>

<head>

<style>

/* ============================================================
   ORIGINAL CSS (UNCHANGED)
   ============================================================ */

* {
  box-sizing: border-box;
}

body {

  padding: 20px;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f1f3f6;
}

/* Two-column layout with flexible widths */
.page-layout,
.main-layout {
  display: grid;
  grid-template-columns: 1fr 1fr; /* equal flexible columns */
  gap: 20px; /* space between columns */
  justify-content: center; /* center the whole grid */
  max-width: 1420px; /* cap total width */
  margin: 0 auto; /* center on page */

/* 🔒 Pin left/right panels on desktop */
.main-layout > .content-area { grid-column: 1; }  /* LEFT column */
.main-layout > .summary-panel { grid-column: 2; } /* RIGHT column */

/* Left side: content */
.content-area {
  background: #fff;
  border: 1px solid #ddd;
  padding: 24px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

/* Right side: summary (sticky) */
.summary-panel {
  background: #fff;
  border: 1px solid #ddd;
  padding: 24px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  overflow-x: hidden;
  overflow-y: auto;

  /* Sticky behavior */
  position: sticky;
  top: 20px; /* distance from top of viewport */
  height: fit-content; /* prevents stretching */
  max-height: calc(100vh - 40px); /* stays within viewport height */
}

#summary {
  width: 100%;
  white-space: pre-wrap; /* preserve line breaks but allow wrapping */
  word-break: break-word; /* force long words to wrap */

}

/* Sections inside content */

h1,

  margin: 16px 0;
}

/* Grid for inputs: only 2 per row */
.grid {

}

input,

<body>

<div class="main-layout">

  <!-- Column 1: content -->

  <div class="content-area">

    <!-- Title -->
    <div class="section">
      <h1>Offnet Provider Guide</h1>
    </div>

<!-- CUSTOMER INFO -->

<div class="section summarizable collapsible" data-section="Customer Information" id="customerInfoSection">
  <div class="section-header">
    <h2 id="ci-heading">Customer Information</h2>
    <button class="section-toggle" aria-expanded="true" aria-controls="ci-panel" aria-label="Toggle">
      <span class="toggle-icon" aria-hidden="true">−</span>
    </button>
  </div>

  <div class="section-panel" id="ci-panel" role="region" aria-labelledby="ci-heading">
    <div class="grid">
      <input id="customerName" data-summary="Name & Surname" placeholder="Name & Surname">
      <input id="cellNumber" data-summary="Cellphone Number" placeholder="000 000 0000" inputmode="tel">
      <input id="siteLocation" data-summary="Site Location" placeholder="Site Location">
      <input id="startTime" data-summary="Start Time / Time Frame" placeholder="Start Time / Time Frame">
      <input id="problemDescription" data-summary="Problem Description" placeholder="Problem Description">

      <select id="offnettype" data-summary="Offnet Service">
        <option>-- Select the offnet provider --</option>
        <option>Open Serve</option>
        <option>Vumatel</option>
        <option>Frog Foot</option>
      </select>
    </div>
	
	<select id="providercontacted" data-summary="Provider Contacted">
        <option>-- Provider Contacted ? --</option>
        <option>Yes</option>
        <option>No</option>
      </select>
    </div>
	
<!-- If providercontacted = 'Yes' (⚠️ offnet provider confirms the problem is not caused by the network & the customer equipment cannot be accessed remotely - Escalate to Field Operations OR The offnet provider confirms the problm is not caused by the network perform required offnet troubleshooting steps ) -->
<!-- If providercontacted = 'No' (⚠️ Contact the offnet provider) -->
	
  </div>
</div>

<!-- SUMMARY PANEL -->

  <div class="summary-panel">
    <div class="section summary-section">
      <h2>Summary</h2>
      <div id="summary"></div>

      <!-- ⭐ Copy left, Home right -->
      <div class="summary-buttons">
        <button class="copy-btn">Copy Summary</button>
        <a class="accent-btn" href="index.html" role="button">Home</a>
      </div>
	  
    </div> <!-- ✅ closes summary-panel -->

  </div> <!-- ✅ closes content-area -->

</div> <!-- ✅ closes main-layout -->


<script>
/* ================================
   GLOBAL DOM REFS
   ================================ */

/* ---- Page layout ---- */
const mainLayout        = document.querySelector('.main-layout');
const contentArea       = document.querySelector('.content-area');

/* ---- Customer Information section (collapsible) ---- */
const customerInfoSection = document.getElementById('customerInfoSection');
const ciHeading           = document.getElementById('ci-heading');
const ciPanel             = document.getElementById('ci-panel');
const ciToggleBtn         = customerInfoSection?.querySelector('.section-toggle');

/* Inputs inside Customer Information */
const customerName       = document.getElementById('customerName');
const cellNumber         = document.getElementById('cellNumber');
const siteLocation       = document.getElementById('siteLocation');
const startTime          = document.getElementById('startTime');
const problemDescription = document.getElementById('problemDescription');

const offnettype         = document.getElementById('offnettype');
const providercontacted  = document.getElementById('providercontacted');

/* Optional: a NodeList of all fields that should appear in the summary */
const summaryFields = document.querySelectorAll('[data-summary]');

/* ---- Summary panel ---- */
const summaryPanelEl = document.querySelector('.summary-panel');
const summarySection = summaryPanelEl?.querySelector('.summary-section');
const summaryBox     = document.getElementById('summary');   // ✅ correct summary target
const copyBtn        = summarySection?.querySelector('.copy-btn');

/* ---- Generic helpers you may want across pages ---- */
const collapsibleSections  = document.querySelectorAll('.section.collapsible');
const sectionToggles       = document.querySelectorAll('.section.collapsible .section-toggle');
const sectionPanels        = document.querySelectorAll('.section.collapsible .section-panel');

/* ---- Quick boolean helpers ---- */
const hasCustomerInfo = !!customerInfoSection && !!ciPanel;
const hasSummary      = !!summaryPanelEl && !!summaryBox && !!copyBtn;


// ==============================
//  📱 PHONE FORMATTER
// ==============================
(function attachPhoneFormatter() {
  if (!cellNumber) return;

  const MAX_DIGITS = 10;

  function formatDigits(d) {
    const clean = (d || '').replace(/\D/g, '').slice(0, MAX_DIGITS);
    const len = clean.length;
    if (len <= 3) return clean;
    if (len <= 6) return `${clean.slice(0,3)} ${clean.slice(3)}`;
    return `${clean.slice(0,3)} ${clean.slice(3,6)} ${clean.slice(6)}`;
  }

  function mapDigitsToCaret(formatted, digitsToLeft) {
    let count = 0, pos = 0;
    while (pos < formatted.length && count < digitsToLeft) {
      if (/\d/.test(formatted[pos])) count++;
      pos++;
    }
    return pos;
  }

  function applyFormatPreserveCaret(el, triggerSummary = true) {
    const start = el.selectionStart ?? el.value.length;
    const digitsBeforeCaret = (el.value.slice(0, start).match(/\d/g) || []).length;

    const formatted = formatDigits(el.value);
    el.value = formatted;

    const newPos = mapDigitsToCaret(formatted, digitsBeforeCaret);
    try { el.setSelectionRange(newPos, newPos); } catch {}

    if (triggerSummary) scheduleUpdateSummary();
  }

  cellNumber.addEventListener('input', () => applyFormatPreserveCaret(cellNumber));
  cellNumber.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text') || '';
    const digits = text.replace(/\D/g, '').slice(0, MAX_DIGITS);
    document.execCommand('insertText', false, digits);
  });
  cellNumber.addEventListener('blur', () => applyFormatPreserveCaret(cellNumber, false));

  applyFormatPreserveCaret(cellNumber, false);
})();


// ==============================
// NEXT RECOMMENDED STEP LOGIC
// (exact wording/icons from your HTML comments)
// ==============================
function getEscalation(id, value) {
  switch (id) {
    case 'providercontacted':
      if (value === 'Yes') {
        return '⚠️ offnet provider confirms the problem is not caused by the network & the customer equipment cannot be accessed remotely - Escalate to Field Operations OR The offnet provider confirms the problm is not caused by the network perform required offnet troubleshooting steps ';
      }
      if (value === 'No') {
        return '⚠️ Contact the offnet provider';
      }
      break;
  }
  return '';
}


// =====================================================
// SAFETY GUARDS — define helpers only if not present
// (prevents duplicate declarations across pages)
// =====================================================
window.isPlaceholderValue ??= function isPlaceholderValue(v) {
  return !v || String(v).trim().startsWith('--');
};

// Collapsed sections should STILL summarize.
// Only exclude elements hidden by your flow logic (.hidden),
// but DO NOT treat ".section-panel.hidden" (collapsible) as hidden.
window.isEffectivelyHidden ??= function isEffectivelyHidden(el) {
  let node = el;
  while (node && node !== document.body) {
    if (node.classList?.contains('hidden') && !node.classList.contains('section-panel')) {
      return true;
    }
    node = node.parentElement;
  }
  return false;
};

// Tiny scheduler (coalesce renders)
window.scheduleUpdateSummary ??= (function () {
  let rafId = null;
  return function scheduleUpdateSummary() {
    if (rafId) return;
    rafId = requestAnimationFrame(() => {
      rafId = null;
      updateSummary(); // defined below
    });
  };
})();


// =====================================================
// LIVE UPDATE LISTENERS
// =====================================================
document.addEventListener('input', (e) => {
  const el = e.target;
  if (el && el.matches?.('[data-summary]')) {
    scheduleUpdateSummary();
  }
});
document.addEventListener('change', (e) => {
  const el = e.target;
  if (el && el.matches?.('[data-summary]')) {
    scheduleUpdateSummary();
  }
});


// =====================================================
// COPY SUMMARY — strip "Next Recommended Step" on copy
// (uses your existing copyBtn & summaryBox)
// =====================================================
if (typeof copyBtn !== 'undefined' && copyBtn) {
  copyBtn.addEventListener('click', async () => {
    try {
      const full = (summaryBox?.textContent || '').trim();   // ✅ use summaryBox
      const filtered = full.replace(
        /(^|\n)===\s*Next Recommended Step\s*===([\s\S]*)$/i,
        '$1'
      ).trim();
      await navigator.clipboard.writeText(filtered);

      const prev = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      setTimeout(() => (copyBtn.textContent = prev), 1200);
    } catch {
      const ta = document.createElement('textarea');
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      ta.value = (summaryBox?.textContent || '')             // ✅ use summaryBox
        .replace(/(^|\n)===\s*Next Recommended Step\s*===([\s\S]*)$/i, '$1')
        .trim();
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      window.getSelection?.()?.removeAllRanges?.();
    }
  });
}


// =====================================================
// SUMMARY GENERATION
//  • Only outputs what exists in your HTML
//  • Sections: "Customer Information" then plain field lines
//  • Then "Next Recommended Step" (if any)
// =====================================================
function updateSummary() {
  const readValue = (el) => {
    if (!el) return '';
    if (el.tagName === 'SELECT') {
      const v = el.value || '';
      return isPlaceholderValue(v) ? '' : v;
    }
    if ('value' in el) return (el.value || '').trim();
    return '';
  };

  let customerInfo = '';
  let otherLines   = '';
  const escalationSet = new Set();

  // Collect only the fields that exist in the provided HTML snippet
  const fields = [
    // Customer Information set
    document.getElementById('customerName'),
    document.getElementById('cellNumber'),
    document.getElementById('siteLocation'),
    document.getElementById('startTime'),
    document.getElementById('problemDescription'),
    // Additional controls in snippet
    document.getElementById('offnettype'),
    document.getElementById('providercontacted'),
  ].filter(Boolean);

  fields.forEach((el) => {
    if (isEffectivelyHidden(el)) return;

    const id    = el.id || '';
    const label = el.getAttribute('data-summary') || id || 'Field';
    const value = readValue(el);
    if (!value) return;

    // Only the five known "Customer Information" fields get the heading
    if (
      id === 'customerName' ||
      id === 'cellNumber'   ||
      id === 'siteLocation' ||
      id === 'startTime'    ||
      id === 'problemDescription'
    ) {
      customerInfo += `${label}: ${value}\n`;
    } else {
      // offnettype, providercontacted appear as plain lines (no extra problem heading)
      otherLines += `${label}: ${value}\n`;
    }

    // Next Recommended Step(s)
    if (typeof getEscalation === 'function') {
      const step = getEscalation(id, value);
      if (step) {
        step.split('\n').forEach((line) => {
          const t = line.trim();
          if (t) escalationSet.add(t);
        });
      }
    }
  });

  const escalationInfo = Array.from(escalationSet).join('\n');

  // Compose summary strictly per the available HTML
  let summaryText = '';
  if (customerInfo) {
    summaryText +=
      '=== Customer Information ===\n' +
      customerInfo +
      '\n';
  }
  if (otherLines) {
    // No extra problem heading — just the remaining lines
    summaryText += otherLines + '\n';
  }
  if (escalationInfo) {
    summaryText +=
      '=== Next Recommended Step ===\n' +
      escalationInfo +
      '\n';
  }

  summaryBox && (summaryBox.textContent = summaryText.trim());   // ✅ write to summaryBox
}


// Initial render
updateSummary();


/* ============================================================
   Collapsibles — matches your HTML and summary behavior
   - Works for any .section.collapsible
   - Hides only the .section-panel (flow .hidden remains intact)
   - Updates aria-expanded, aria-controls, and the +/− icon
   - Calls scheduleUpdateSummary() if present
   ============================================================ */
(function setupCollapsibles() {
  const safeSchedule =
    (typeof scheduleUpdateSummary === 'function')
      ? scheduleUpdateSummary
      : function () {};

  function setExpanded(section, expanded) {
    const btn   = section.querySelector('.section-toggle');
    const icon  = btn?.querySelector('.toggle-icon');
    const panel = section.querySelector(':scope > .section-panel') || section.querySelector('.section-panel');

    // Visual collapse (does not affect flow states)
    section.classList.toggle('is-collapsed', !expanded);

    // Hide/show only the panel body; keep data retained for summary
    if (panel) {
      panel.classList.toggle('hidden', !expanded);

      // Ensure ARIA wiring between toggle and panel
      if (btn && !btn.hasAttribute('aria-controls')) {
        const id = panel.id || `section-panel-${Math.random().toString(36).slice(2, 8)}`;
        panel.id = id;
        btn.setAttribute('aria-controls', id);
      }
    }

    // ARIA + icon
    btn?.setAttribute('aria-expanded', String(expanded));
    if (icon) icon.textContent = expanded ? '−' : '+';

    // Keep summary fresh
    safeSchedule();
  }

  function toggle(section) {
    const btn = section.querySelector('.section-toggle');
    const current = btn?.getAttribute('aria-expanded') === 'true';
    setExpanded(section, !current);
  }

  // Initialize every collapsible section on the page (e.g., Customer Information)
  document.querySelectorAll('.section.collapsible').forEach((section) => {
    const btn = section.querySelector('.section-toggle');
    if (!btn) return;

    // Initial state comes from the button's aria-expanded (true by default)
    const initialExpanded = btn.hasAttribute('aria-expanded')
      ? (btn.getAttribute('aria-expanded') === 'true')
      : true;
    setExpanded(section, initialExpanded);

    // Click / keyboard
    btn.addEventListener('click', () => toggle(section));
    btn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggle(section);
      }
    });
  });

  // Optional programmatic API
  window.expandSection = function (sectionEl) { if (sectionEl) setExpanded(sectionEl, true); };
  window.collapseSection = function (sectionEl) { if (sectionEl) setExpanded(sectionEl, false); };
})();
</script>
