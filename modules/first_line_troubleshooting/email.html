
<!DOCTYPE html>
<html lang="en">

<!-- ⭐ AUTO‑APPLY THEME from index page BEFORE anything renders -->

<script>
  (function () {
    try {
      const THEME_KEY = 'app-theme';
      const LIGHT = 'theme-light';
      const DARK  = 'theme-dark';
      const saved = localStorage.getItem(THEME_KEY);
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const cls = (saved === LIGHT || saved === DARK) ? saved : (prefersDark ? DARK : LIGHT);
      document.documentElement.classList.add(cls);
    } catch (e) {}
  })();
</script>

<head>
  <meta charset="UTF-8" />
  <title>First Line Support – Troubleshooting Guide V3.4</title>

<style>


/* ============================================================
   ORIGINAL CSS (UNCHANGED STRUCTURE / UPDATED FOR GRID-BASED FORMS)
   ============================================================ */

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 20px;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f1f3f6;
}

/* Two-column layout with flexible widths */
.page-layout,
.main-layout {
  display: grid;
  grid-template-columns: 1fr 1fr; /* equal flexible columns */
  gap: 20px; /* space between columns */
  justify-content: center; /* center the whole grid */
  max-width: 1420px; /* cap total width */
  margin: 0 auto; /* center on page */
  align-items: start; /* ensures sticky aligns at top */
}

/* Left side: content */
.content-area {
  background: #fff;
  border: 1px solid #ddd;
  padding: 24px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

/* Right side: summary (sticky) */
.summary-panel {
  background: #fff;
  border: 1px solid #ddd;
  padding: 24px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  overflow-x: hidden;
  overflow-y: auto;

  /* Sticky behavior */
  position: sticky;
  top: 20px; /* distance from top of viewport */
  height: fit-content; /* prevents stretching */
  max-height: calc(100vh - 40px); /* stays within viewport height */
}

#summary {
  width: 100%;
  white-space: pre-wrap; /* preserve line breaks but allow wrapping */
  word-break: break-word; /* force long words to wrap */
  overflow-wrap: break-word; /* modern equivalent */
  line-height: 1.5;
  margin-bottom: 12px;
}

/* Sections inside content */
.section {
  background: #fff;
  padding: 24px;
  margin-bottom: 24px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

h1,
h2 {
  text-align: center;
  margin: 16px 0;
}

/* Base inputs */
input,
select {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
}

/* Icon rows (labels with icons) */
.icon-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 0;     /* reset: we control vertical rhythm via grid row-gap */
  font-weight: 600;
}

/* Link icon */
.link-icon {
  width: 18px;
  height: 18px;
  background: #F58220;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  color: #fff;
}
.link-icon:hover {
  background: #d96a15;
}

/* Info icon + tooltip */
.info-icon {
  width: 18px;
  height: 18px;
  background: #16a34a;
  border-radius: 50%;
  color: #fff;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: help;
  position: relative;
}
.info-icon:hover::after {
  content: attr(data-info);
  position: absolute;
  top: 26px;
  left: 0;
  background: #111827;
  color: #fff;
  padding: 8px;
  width: 400px;
  font-size: 12px;
  border-radius: 6px;
  z-index: 100;
  white-space: normal;
  word-wrap: break-word;
}

/* Fibre Slow Speed section override (kept for consistency) */
#fibreSlowSection {
  width: 100%;
  margin-bottom: 32px;
}

.speed-results {
  display: flex;
  gap: 16px;
}

.speed-results input {
  flex: 1;
  min-width: 120px;
  margin-bottom: 0;
}

.hidden {
  display: none !important;
}

/* Input with trailing unit select (MB/GB) */
.input-with-unit {
  display: flex;
  align-items: center;
  gap: 8px; /* space between input and select */
}
.input-with-unit input {
  flex: 1; /* input takes available width */
}
.input-with-unit select {
  width: 80px; /* fixed width for MB/GB dropdown */
}

.copy-btn {
  align-self: flex-start;
}

.summary-block {
  margin-top: 12px;
}
.summary-block h3 {
  text-decoration: underline;
  margin-bottom: 6px;
}

/* Responsive fallback */
@media (max-width: 900px) {
  .page-layout,
  .main-layout {
    grid-template-columns: 1fr; /* single column */
    max-width: 100%; /* full width */
  }

  .content-area,
  .summary-panel {
    width: 100%;
    max-height: none;
    position: static;
  }
}

/* ------ Collapsible Sections ------ */

.section.collapsible {
  padding: 0;
  border-radius: 8px;
  position: relative;
}

/* Header bar using 3‑column grid */
.section-header {
  display: grid;
  grid-template-columns: 1fr auto 1fr; /* left | center | right */
  align-items: center;
  padding: 16px;
  background: #f7f7f9;
  border-bottom: 1px solid #eee;
}

/* Center column: heading */
.section-header h2 {
  grid-column: 2; /* middle column */
  justify-self: center;
  margin: 0;
  font-size: 1.2rem;
  text-align: center;
}

/* Right column: toggle button */
.section-toggle {
  grid-column: 3; /* right column */
  justify-self: end;

  border: 1px solid #d1d5db;
  background: #fff;
  border-radius: 6px;
  width: 28px;
  height: 28px;

  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.section-toggle:focus {
  outline: 2px solid #2563eb;
  outline-offset: 3px;
}
.toggle-icon {
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
}

/* Collapsible panel body */
.section-panel {
  padding: 20px;
}
.section-panel.hidden {
  display: none;
}

/* ============================================================
   ⭐ THEME SYSTEM — VARIABLES + OVERRIDES
   ============================================================ */

:root {
  --body-bg: #ffffff;
  --body-text: #000000;

  --card-bg: #ffffff;
  --card-text: #000000;
  --card-border: #dddddd;
  --panel-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

  --summary-border: #ff5000;
  --brand-accent: #ff5000;

  --input-bg: #ffffff;
  --input-text: #000000;
  --input-border: #d1d5db;

  --header-bg: #f7f7f9;
  --header-border: #eeeeee;
}

.theme-light {
  --body-bg: #ffffff;
  --body-text: #000000;

  --card-bg: #ffffff;
  --card-text: #000000;
  --card-border: #dddddd;
  --panel-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

  --summary-border: #ff5000;
  --brand-accent: #ff5000;
}

.theme-dark {
  --body-bg: #1c2025;
  --body-text: #ffffff;

  --card-bg: #232a31;
  --card-text: #ffffff;
  --card-border: #3a3f45;
  --panel-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);

  --input-bg: #2c3238;
  --input-text: #ffffff;
  --input-border: #3a3f45;

  --summary-border: #ff5000;
  --brand-accent: #ff5000;

  --header-bg: #1F2630;     /* Darker header bar */
  --header-text: #F9FAFB;   /* Bright readable text */
}

/* THEME OVERRIDES */
body {
  background: var(--body-bg);
  color: var(--body-text);
}

/* Panels and sections */
.content-area,
.section {
  background: var(--card-bg);
  color: var(--card-text);
  border: 1px solid var(--card-border);
  box-shadow: var(--panel-shadow);
}

/* ⭐ Theme A — Left Accent Border for summary panel */
.summary-panel {
  background: var(--card-bg);
  color: var(--card-text);
  border: none;
  border-left: 4px solid var(--summary-border);
  padding-left: 24px;
  border-radius: 8px;
  box-shadow: var(--panel-shadow);
}

/* Accent for toggle */
.section-toggle .toggle-icon {
  color: var(--brand-accent);
}

/* Inputs adopt theme */
input,
select {
  background: var(--input-bg);
  color: var(--input-text);
  border: 1px solid var(--input-border);
}

/* Accent buttons */
.copy-btn,
.accent-btn {
  background: var(--brand-accent);
  color: #fff;
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.2s ease;
}
.copy-btn:hover,
.accent-btn:hover {
  background: #e04800;
}

/* Button row */
.summary-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

/* DARK MODE — header styles + brand border */
.theme-dark .section-header {
  background: #1F2630 !important;
}
.theme-dark .section-header h2 {
  color: #F9FAFB !important;
}
/* Apply brand-orange border for all themes */
.section-header {
  border-bottom: 1px solid var(--brand-accent) !important;
}

/* ============================================================
   ✅ UNIVERSAL FORM GRID (keep .grid simple and equal halves)
   - label left
   - dropdown/input right
   ============================================================ */

/* All .grid blocks use 2 equal-width columns (as before) */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* --- label formatting inside grid --- */
.grid > label.icon-row {
  grid-column: 1;
  align-self: center;
  margin: 0; /* remove default margin so rows align nicely */
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* --- input / select formatting inside grid --- */
.grid > select,
.grid > input {
  grid-column: 2;
  width: 100%;
  margin: 0;
}

/* Extra: spacing consistency between rows */
.section-panel .grid {
  row-gap: 14px; /* even vertical spacing between each row */
}

/* 📱 Mobile: stack label above control */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .grid > label.icon-row,
  .grid > select,
  .grid > input {
    grid-column: 1;
  }
}

/* Ensure hidden still actually hides (belt-and-braces) */
.hidden {
  display: none !important;
}

/* ============================================================
   (Optional helpers you already referenced in HTML)
   ============================================================ */

/* Inputs-only two-up grid (used where you explicitly add grid-2up) */
.grid-2up {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  column-gap: 16px;
  row-gap: 12px;
}
.grid-2up > * { min-width: 0; }

/* Pair-grid for rows where you explicitly use it (does NOT change .grid) */
.pair-grid {
  display: grid;
  grid-template-columns: clamp(200px, 33%, 360px) minmax(0, 1fr);
  column-gap: 16px;
  row-gap: 12px;
  align-items: center;
}
.pair-grid > * { min-width: 0; }
.pair-grid > label.icon-row {
  display: flex; align-items: center; gap: 8px; margin: 0; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pair-grid > select, .pair-grid > input { width: 100%; margin: 0; }


/* ============================================================
   📏 EMAIL — Global, uniform row spacing across ALL SECTIONS
   Customer Information, CHIP Dashboard, and every Email flow
   ============================================================ */

/* 1) Align labels baseline everywhere inside panels */
.section-panel label.icon-row {
  margin-top: 0;
  align-self: center;
}

/* 2) If a section uses .grid → use the same vertical rhythm as VoIP */
.section-panel .grid {
  row-gap: 16px !important; /* consistent gap between label and control */
}

/* 3) If a section uses .pair-grid → same rhythm */
.section-panel .pair-grid {
  row-gap: 16px !important;
}

/* 4) If a section has simple siblings (label followed by control) and not in a grid,
      give those pairs the same spacing. */
.section-panel > label.icon-row + select,
.section-panel > label.icon-row + input {
  display: block;
  margin-bottom: 12px !important; /* match VoIP default row spacing */
}

/* 5) For step blocks (divs) that show/hide in flows:
      when visible, give them an even bottom spacing, but not on the last one */
.section-panel > div:not(.hidden) {
  margin-bottom: 12px;            /* consistent section row spacing */
}

/* Remove bottom gap on the last visible block within the panel */
.section-panel > div:not(.hidden):last-child {
  margin-bottom: 0 !important;
}

/* 6) Some Email pages wrap CHIP sub-blocks (Outage, Ticket, JobCard) in their own divs.
      Give them the same bottom spacing without changing their layout. */
#chipSection .section-panel #outageStatusBlock:not(.hidden),
#chipSection .section-panel #ticketStatusBlock:not(.hidden),
#chipSection .section-panel #jobCardBlock:not(.hidden) {
  margin-bottom: 12px;
}

/* 7) Inputs-with-unit rows should align to the same rhythm */
.section-panel .input-with-unit {
  margin-bottom: 12px; /* when used as the control row content */
}

/* 8) Mobile stacking keeps the breathing room */
@media (max-width: 900px) {
  .section-panel > label.icon-row + select,
  .section-panel > label.icon-row + input {
    margin-top: 6px;               /* small gap when stacked */
    margin-bottom: 14px;           /* readably spaced in single column */
  }
}


/* ============================================================
   📏 EMAIL — Uniform row spacing across ALL sections
   Works for sections with .section-panel AND sections without it
   (e.g., Cannot Send/Receive places rows directly under .section)
   ============================================================ */

/* --- 0) Helper: a scope list for both structures --- */
:root {
  /* noop: marker comment to keep this block grouped */
}

/* 1) Align labels baseline everywhere (both structures) */
.section-panel label.icon-row,
.section > label.icon-row,
.section .pair-grid > label.icon-row,
.section .grid > label.icon-row {
  margin-top: 0;
  align-self: center;
}

/* 2) Consistent row-gap for grids (both structures) */
.section-panel .grid,
.section .grid {
  row-gap: 16px !important; /* VoIP-like rhythm between label/control */
}
.section-panel .pair-grid,
.section .pair-grid {
  row-gap: 16px !important;
}

/* 3) Spacing for simple label+control siblings NOT inside a grid
      (applies whether content is in .section-panel or directly under .section) */
.section-panel > label.icon-row + select,
.section-panel > label.icon-row + input,
.section > label.icon-row + select,
.section > label.icon-row + input {
  display: block;
  margin-bottom: 12px !important;
}

/* 4) Spacing for visible step blocks (divs) that show/hide
      Give even bottom spacing, but not on the last visible block */
.section-panel > div:not(.hidden),
.section > div:not(.hidden) {
  margin-bottom: 12px;
}
.section-panel > div:not(.hidden):last-child,
.section > div:not(.hidden):last-child {
  margin-bottom: 0 !important;
}

/* 5) Inputs-with-unit should align to the same rhythm no matter where they are */
.section-panel .input-with-unit,
.section .input-with-unit {
  margin-bottom: 12px;
}

/* 6) Mobile: keep breathing room when stacked */
@media (max-width: 900px) {
  .section-panel > label.icon-row + select,
  .section-panel > label.icon-row + input,
  .section > label.icon-row + select,
  .section > label.icon-row + input {
    margin-top: 6px;
    margin-bottom: 14px;
  }
}


/* ============================================================
   📚 EMAIL — Allow long labels/headings to wrap (no overlap)
   Applies to ALL sections, regardless of structure
   ============================================================ */

/* 1) Let labels/headings wrap across multiple lines */
.section-panel label.icon-row,
.section > label.icon-row,
.section .grid > label.icon-row,
.section .pair-grid > label.icon-row {
  /* Allow wrapping */
  white-space: normal;
  overflow: visible;          /* ensure wrapped text is visible */
  text-overflow: clip;        /* prevent ellipsis clipping on wrap */
  word-break: break-word;     /* break long “words” (like URLs) if needed */
  overflow-wrap: anywhere;    /* modern wrapping for long tokens */
  align-self: start;          /* top-align the label in the grid row */
}

/* 2) Ensure the control sits at the top to avoid crossing the label’s wrapped lines */
.section .grid > select,
.section .grid > input,
.section .pair-grid > select,
.section .pair-grid > input,
.section > label.icon-row + select,
.section > label.icon-row + input {
  align-self: start;
}

/* 3) Row containers (grids) should align items to the start so multi-line labels
      don’t vertically center against controls */
.section .grid,
.section .pair-grid,
.section-panel .grid,
.section-panel .pair-grid {
  align-items: start;
}

/* 4) Optional: if any headings inside section headers are getting clipped,
      allow them to wrap too (keeps center alignment) */
.section-header h2 {
  white-space: normal; 
  overflow-wrap: anywhere;
  word-break: break-word;
}

/* 5) Safety: ensure grid children can shrink so wrapping doesn’t force overflow */
.section .grid > *,
.section .pair-grid > *,
.section-panel .grid > *,
.section-panel .pair-grid > * {
  min-width: 0;
}


/* Collapse visual state for sections that don't use .section-panel
   (do NOT touch inner .hidden flags used by the flow) */
.section.is-collapsed > :not(.section-header) {
  display: none !important;
}


#chipSection .section-panel #outageStatusBlock > .pair-grid:not(:last-child) {
  margin-bottom: 12px;
}


</style>
  
</head>


<body>

<div class="main-layout">

  <!-- Column 1: content -->
  <div class="content-area">

    <!-- Title -->
    <div class="section">
      <h1>Email Troubleshooting Guide</h1>
    </div>

    <!-- CUSTOMER INFO -->

    <div class="section summarizable collapsible" data-section="Customer Information" id="customerInfoSection">
      <div class="section-header">
        <h2 id="ci-heading">Customer Information</h2>
        <button class="section-toggle" aria-expanded="true" aria-controls="ci-panel" aria-label="Toggle">
          <span class="toggle-icon" aria-hidden="true">−</span>
        </button>
      </div>

      <div class="section-panel" id="ci-panel" role="region" aria-labelledby="ci-heading">
        <!-- inputs-only list → two equal columns -->
        <div class="grid-2up">
          <input id="customerName" data-summary="Name & Surname" placeholder="Name & Surname">
          <input id="cellNumber" data-summary="Cellphone Number" placeholder="000 000 0000" inputmode="tel">
          <input id="siteLocation" data-summary="Site Location" placeholder="Site Location">
          <input id="startTime" data-summary="Start Time / Time Frame" placeholder="Start Time / Time Frame">
          <input id="emailName" data-summary="Email Name & Surname" placeholder="Name of person on site that can assist if needed">
          <input id="emailCellNumber" data-summary="Cellphone Number" placeholder="Cell-Number of person on site that can assist if needed" inputmode="tel">
          <input id="emailAddressMain" data-summary="Email Address" placeholder="Email address experiencing the problem">
          <input id="emailDomain" data-summary="Domain" placeholder="Domain of the email address">
        </div>

        <!-- ISP -->
        <div class="pair-grid">
          <label class="icon-row">ISP?
            <span class="link-icon">🔗</span>
            <span class="info-icon" data-info="Confirm who hosts the customer's internet service.">i</span>
          </label>
          <select id="emailISP" data-summary="ISP">
            <option>-- Select --</option>
            <option>Herotel</option>
            <option>Third Party</option>
          </select>
        </div>

        <!-- Internet access step -->
        <div id="emailInternetBlock" class="pair-grid">
          <label class="icon-row">Internet access check
            <span class="link-icon">🔗</span>
            <span class="info-icon" data-info="Verify if the customer has internet access.">i</span>
          </label>
          <select id="emailInternetCheck" data-summary="Internet Access">
            <option>-- Select --</option>
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        <!-- If emailInternetCheck = 'No' (⚠️ Complete the no internet flow chart for the medium) -->

        <!-- Remains full-width under the grid -->
        <select id="problemDescription" data-summary="Problem Description">
          <option>-- Problem Description --</option>
          <option>Cannot Send / Receive</option>
          <option>Mailbox limit Reached</option>
          <option>Email password change</option>
          <option>New Email Request</option>
          <option>Domain Request Change</option>
          <option>Email Forwarding</option>
        </select>
      </div>
    </div> <!-- Closes customer info -->

    <!-- CHIP DASHBOARD -->

    <div class="section summarizable hidden collapsible" data-section="CHIP Dashboard" id="chipSection">
      <div class="section-header">
        <h2 id="chip-heading">CHIP Dashboard</h2>
        <button class="section-toggle" aria-expanded="true" aria-controls="chip-panel" aria-label="Toggle">
          <span class="toggle-icon" aria-hidden="true">−</span>
        </button>
      </div>

      <div class="section-panel" id="chip-panel" role="region" aria-labelledby="chip-heading">
        <div class="pair-grid">
          <label class="icon-row">Account Status
		      <a class="link-icon" href="ph-CHIP Account Status" target="_blank" rel="noopener">🔗</a>
              <span class="info-icon" data-info="The account status must be active. If its suspended / cancelled the PPPoE authentication for all radius users (installs) linked to that account will be set to reject and no PPPoe authentication will take place for those radius users.">i</span>
          </label>
          <select id="accountStatus" data-summary="Account Status">
            <option>-- Select --</option>
            <option>Active</option>
            <option>Suspended</option>
            <option>Cancelled</option>
          </select>
        </div>

        <div id="outageStatusBlock">
          <div class="pair-grid">
            <label class="icon-row">Outage Status
              <a class="link-icon" href="ph-CHIP Outage Status" target="_blank" rel="noopener">🔗</a>
              <span class="info-icon" data-info="CHIP only shows active outages caused by equipment being unreachable. Degraded service , email / voip outages must still be confirmed on the teams outage channels. It is important to confirm whether a customer is affected by a outage as it will determine whether first line support is able to assist with the problem being expereinced or whether the problem is a affect of the active outage">i</span>
            </label>
            <select id="outageStatus" data-summary="Outage Status">
              <option>-- Select --</option>
              <option>Active</option>
              <option>Suspected outage</option>
              <option>Normal</option>
            </select>
          </div>

          <div id="ticketStatusBlock" class="pair-grid">
            <label class="icon-row">Ticket Status
               <a class="link-icon" href="ph-Ticket Status" target="_blank" rel="noopener">🔗</a>
               <span class="info-icon" data-info="In the case of duplicate tickets (multiple tickets logged for the same site & same problem) merge the duplicate tickets. If the customers has an existing ticket for the site & problem work on the existing ticket , DO NOT CREATE A NEW ONE. Only create a new ticket if no ticket for that site & problem is present. Following this procedure keeps the tickets volumes down by preventing multiple tickets logged for the same site & problem as well prevents duplicate tickets from remaining open on the system after the problem has been resolved.">i</span>
            </label>
            <select id="ticketStatus" data-summary="Ticket Status">
              <option>-- Select --</option>
              <option>New ticket</option>
              <option>Existing ticket</option>
            </select>
          </div>

    if (!container) return;

  // Hidden detection: ignore .section-panel collapse, do not hide when ancestor is .is-collapsed
  const isEffectivelyHidden = (el) => {
    let node = el;
    while (node && node !== document.body) {
      if (node.classList?.contains('hidden') && !node.classList.contains('section-panel')) return true;
      node = node.parentElement;
    }
    return false;
  };

  let rafId = null;
  function scheduleUpdateSummary() {
    if (rafId) return;
    rafId = requestAnimationFrame(() => {
      rafId = null;
      updateSummary();
    });
  }
  
  // ==============================
  //  COLLAPSIBLES — safe for Email sections w/o .section-panel
  // ==============================
  (function setupCollapsibles() {

    function setExpanded(section, expanded) {
      const btn  = section.querySelector('.section-toggle');
      const icon = btn?.querySelector('.toggle-icon');

      // Try the standard container first
      const panel = section.querySelector(':scope > .section-panel');

      if (panel) {
        // Standard pages (with .section-panel) → just hide the panel
        panel.classList.toggle('hidden', !expanded);
      } else {
        // Email pages (no .section-panel) → never touch inner .hidden states
        // Just collapse the section visually
        section.classList.toggle('is-collapsed', !expanded);
      }

      // ARIA + icon
      btn?.setAttribute('aria-expanded', String(expanded));
      if (icon) icon.textContent = expanded ? '−' : '+';
    }

    function toggle(section) {
      // Do nothing if router has hidden the whole section
      if (section.classList.contains('hidden')) return;

      const btn = section.querySelector('.section-toggle');
      const current = btn?.getAttribute('aria-expanded') === 'true';
      setExpanded(section, !current);
    }

    document.querySelectorAll('.section.collapsible').forEach(section => {
      const btn = section.querySelector('.section-toggle');
      if (!btn) return;

      const initialExpanded =
        btn.hasAttribute('aria-expanded')
          ? btn.getAttribute('aria-expanded') === 'true'
          : true;

      // Initialize without touching flow visibility
      setExpanded(section, initialExpanded);

      btn.addEventListener('click', () => toggle(section));
      btn.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggle(section);
        }
      });
    });
  })();

  // ==============================
  //  PHONE FORMATTER — cell + emailCell
  // ==============================
  (function phoneFormatterMulti() {
    const targets = [cellNumber, emailCellNumber].filter(Boolean);
    if (!targets.length) return;

    const MAX_DIGITS = 10;
    const formatDigits = (d) => {
      const clean = (d || '').replace(/\D/g, '').slice(0, MAX_DIGITS);
      const len = clean.length;
      if (len <= 3) return clean;
      if (len <= 6) return `${clean.slice(0,3)} ${clean.slice(3)}`;
      return `${clean.slice(0,3)} ${clean.slice(3,6)} ${clean.slice(6)}`;
    };
    const mapDigitsToCaret = (formatted, digitsToLeft) => {
      let count = 0, pos = 0;
      while (pos < formatted.length && count < digitsToLeft) { if (/\d/.test(formatted[pos])) count++; pos++; }
      return pos;
    };
    function apply(el, triggerSummary = true) {
      const start = el.selectionStart ?? el.value.length;
      const digitsLeft = (el.value.slice(0, start).match(/\d/g) || []).length;
      const formatted = formatDigits(el.value);
      el.value = formatted;
      const newPos = mapDigitsToCaret(formatted, digitsLeft);
      try { el.setSelectionRange(newPos, newPos); } catch {}
      if (triggerSummary) scheduleUpdateSummary();
    }
    function onPasteSanitize(e, el) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text') || '';
      const digits = text.replace(/\D/g, '').slice(0, MAX_DIGITS);
      try { document.execCommand('insertText', false, digits); } catch { el.value += digits; }
      apply(el);
    }
    targets.forEach(el => {
      if (!el.getAttribute('inputmode')) el.setAttribute('inputmode', 'tel');
      el.addEventListener('input', () => apply(el));
      el.addEventListener('paste', e => onPasteSanitize(e, el));
      el.addEventListener('blur',  () => apply(el, false));
      apply(el, false);
    });
  })();

  // ==============================
  //  EMAIL SECTIONS VISIBILITY (router)
  // ==============================
  const emailSections = [
    emailCannotSendReceive, emailMailboxLimit, emailPasswordChange,
    emailNewRequest, emailDomainChange, emailForwarding
  ];

  function hideAllEmailSections() {
    emailSections.forEach(sec => { if (sec) { hide(sec); resetContainer(sec); } });
  }

  function updateEmailProblemSection() {
    const hasInternet = emailInternetCheck?.value === 'Yes';
    const prob = (problemDescription?.value || '').trim();

    hideAllEmailSections();

    if (!hasInternet) {
      // ✅ Exception: if Internet is No but the problem is "Domain Request Change",
      // still show the Domain Request Change section.
      if (prob === 'Domain Request Change') {
        show(emailDomainChange);
      }
      scheduleUpdateSummary();
      return;
    }

    // Normal online routing
    switch (prob) {
      case 'Cannot Send / Receive':        show(emailCannotSendReceive); break;
      case 'Mailbox limit Reached':        show(emailMailboxLimit);      break;
      case 'Email password change':        show(emailPasswordChange);    break;

      case 'Domain Request Change':        show(emailDomainChange);      break;
      case 'Email Forwarding':             show(emailForwarding);        break;

    scheduleUpdateSummary();
  }

// ==============================
//  SUMMARY GENERATION (matches No‑Internet) + COMBO PATCH
// ==============================
// 🔸 Do NOT show these in the printed Summary text,
//     BUT still allow them to produce Next Recommended Step entries.
const skipSummaryIds = [
  "portalLoginCheck1",
  "portalLoginCheck2",
  "portalLoginCheck3",
  "portalLoginCheck5",
  "portalLoginCheck6",
  "rmStatus1",
  "mailTester1",
];

function updateSummary() {

  // --- FIXED readValue() so MB (first option) is *not* treated as placeholder ---
  const readValue = (el) => {
    if (!el) return '';

    if (el.tagName === 'SELECT') {

      const v = (el.value || '').trim();

      // Determine if *this select* actually has a placeholder option at index 0
      const firstText =
        (el.options && el.options.length > 0)
          ? (el.options[0].text || '').trim()
          : '';

      const firstIsPlaceholder = firstText.startsWith('--'); // true for “-- Select --”
      const isPlaceholder =
        (firstIsPlaceholder && el.selectedIndex === 0) ||
        v.startsWith('--');

      return isPlaceholder ? '' : v;
    }

    if ('value' in el) return (el.value || '').trim();
    return '';
  };

  // --- Combo field helper: joins numeric value + unit into one line
  function readCombo(inputEl, unitEl) {
    const v = readValue(inputEl);
    const u = readValue(unitEl);
    if (!v) return '';
    return u ? `${v} ${u}` : v;
  }

  // Group text
  let customerInfo = '';
  let chipInfo     = '';
  let problemInfo  = '';
  const escalationSet = new Set();

  const fields = Array.from(document.querySelectorAll('[data-summary]'));
  fields.forEach(el => {
    if (isEffectivelyHidden(el)) return;

    const id    = el.id || '';
    const label = el.getAttribute('data-summary') || id || 'Field';

    // --- Suppress unit-only lines in summary
    if (
      id === 'domainStorageUnit' ||
      id === 'emailStorageUnit' ||
      id === 'updatedEmailStorageUnit'
    ) {
      return;
    }

    // --- QUOTA INCREASE COMBINED FIELDS (one-line value + unit)
    if (id === 'domainStorageValue') {
      const combo = readCombo(domainStorageValue, domainStorageUnit);
      if (combo) problemInfo += `${label}: ${combo}\n`;
      return;
    }
    if (id === 'emailStorageValue') {
      const combo = readCombo(emailStorageValue, emailStorageUnit);
      if (combo) problemInfo += `${label}: ${combo}\n`;
      return;
    }
    if (id === 'updatedEmailStorageValue') {
      const combo = readCombo(updatedEmailStorageValue, updatedEmailStorageUnit);
      if (combo) problemInfo += `${label}: ${combo}\n`;
      return;
    }

    const value = readValue(el);
    if (!value) return;

    // Always compute "Next Recommended Step" even for skipped IDs
    const step = getEscalation(id, value);
    if (step) {
      step.split('\n').forEach(line => {
        const t = line.trim();
        if (t) escalationSet.add(t);
      });
    }

    // Skip adding to visible summary if in skip list
    if (skipSummaryIds.includes(id)) return;

    // Otherwise add normally
    if (
      id === 'customerName'        || id === 'cellNumber'        ||
      id === 'siteLocation'        || id === 'startTime'         ||
      id === 'emailName'           || id === 'emailCellNumber'   ||
      id === 'emailAddressMain'    || id === 'emailDomain'       ||
      id === 'emailISP'            || id === 'emailInternetCheck'||
      id === 'problemDescription'
    ) {
      customerInfo += `${label}: ${value}\n`;
    } else if (
      id === 'accountStatus' || id === 'outageStatus' ||
      id === 'ticketStatus'  || id === 'jobCard'
    ) {
      chipInfo += `${label}: ${value}\n`;
    } else {
      problemInfo += `${label}: ${value}\n`;
    }
  });

  // Problem heading
  const prob = (problemDescription?.value || '').trim();
  let problemHeading = '';
  if (emailInternetCheck?.value === 'Yes') {
    switch (prob) {
      case 'Cannot Send / Receive':        problemHeading = 'Email - Cannot Send / Receive'; break;
      case 'Mailbox limit Reached':        problemHeading = 'Email - Mailbox Limit Reached';  break;
      case 'Email password change':        problemHeading = 'Email - Password Change';        break;
      case 'New Email Request':            problemHeading = 'Email - New Email Request';      break;
      case 'Domain Request Change':        problemHeading = 'Email - Domain Request Change';  break;
      case 'Email Forwarding':             problemHeading = 'Email - Forwarding';             break;
    }
  }

  const escalationInfo = Array.from(escalationSet).join('\n');

  // Assemble summary text
  let summaryText = '';
  if (customerInfo)
    summaryText += '=== Customer Information ===\n' + customerInfo + '\n\n';
  if (chipInfo)
    summaryText += '=== CHIP Troubleshooting ===\n' + chipInfo + '\n\n';
  if (problemInfo && problemHeading)
    summaryText += '=== ' + problemHeading + ' ===\n' + problemInfo + '\n\n';

  if (escalationInfo)
    summaryText += '=== Next Recommended Step ===\n' + escalationInfo + '\n';

  if (summaryPanel) summaryPanel.textContent = summaryText.trim();
}
